<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tánit y Rubén - Nuestra Boda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-wrapper">
      <img
        src="images/Cover.png"
        alt="Wedding Background"
        class="background-image"
      />
      <div class="overlay"></div>
    </div>

    <div class="container">
      <div class="names">
        <h1>Tánit y Rubén</h1>
      </div>

      <div class="subtitle">
        <p>Una vida juntos, un paso más para celebrar.</p>
      </div>

      <div class="details">
        <div class="detail-item">
          <h3>📅 Fecha</h3>
          <p>Sábado, 15 de Mayo de 2026</p>
        </div>

        <div class="detail-item">
          <h3>🕐 Hora</h3>
          <p>17:00 horas</p>
        </div>

        <div class="detail-item">
          <h3>📍 Lugar</h3>
          <p>Hacienda Los Jardines</p>
          <p class="address">Calle de la Felicidad, 123</p>
        </div>
      </div>

      <div class="footer">
        <p>Con amor,</p>
        <p class="signature">Tánit & Rubén</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
